spring.application.name=rect

spring.data.mongodb.uri=${MONGO_URL}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1000GB
spring.servlet.multipart.max-request-size=1000GB

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

maxmind.database.path: classpath:GeoLite2-City.mmdb

com.rect.iot.jwt-secret=${JWT_SECRET_KEY}